<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — The Daily Drift CMS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 220px;
      --ink: #0a0a0a;
      --canvas: #ffffff;
      --surface: #f5f5f5;
      --surface-2: #ebebeb;
      --border: #e2e2e2;
      --mute: #666;
      --accent: #7c3aed;
      --accent-2: #ec4899;
      --cyan: #06b6d4;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --sidebar-bg: #0d0d0d;
      --sidebar-text: #a1a1aa;
      --sidebar-active: #ffffff;
      --sidebar-hover: #1a1a1a;
      --grad: linear-gradient(135deg, #06b6d4, #7c3aed, #ec4899);
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--surface); color: var(--ink); }

    /* ── Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      z-index: 100;
      border-right: 1px solid #1f1f1f;
    }
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid #1f1f1f; }
    .sidebar-logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; color: #fff; }
    .sidebar-logo-text span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sidebar-logo-sub { font-size: 10px; color: #555; letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--sidebar-text);
      transition: all .15s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-active); }
    .nav-item.active { background: #1e1e1e; color: #fff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-bottom { padding: 12px 8px; border-top: 1px solid #1f1f1f; }
    .sidebar-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 8px; background: #1a1a1a; border-radius: 20px;
      font-size: 11px; color: #555; font-weight: 500;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Main */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--canvas); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--ink); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .content { padding: 24px; flex: 1; max-width: 1200px; }

    /* ── Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius); font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s;
      font-family: inherit; white-space: nowrap; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-2); }
    .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-grad { background: var(--grad); color: #fff; }
    .btn-grad:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Cards */
    .card { background: var(--canvas); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .card-body { padding: 20px; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 13px; font-weight: 600; }

    /* ── Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--canvas); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--mute); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -1px; }

    /* ── Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--mute); border-bottom: 1px solid var(--border); background: var(--surface); }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    /* ── Badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-tech { background: #ecfeff; color: #0e7490; }
    .badge-memes { background: #fdf2f8; color: #be185d; }
    .badge-creators { background: #f5f3ff; color: #6d28d9; }
    .badge-movies { background: #fffbeb; color: #b45309; }
    .badge-featured { background: #f0fdf4; color: #15803d; }
    .badge-trending { background: #fff7ed; color: #c2410c; }
    .badge-draft { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .badge-live { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }

    /* ── Form elements */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label.form-label { font-size: 12px; font-weight: 600; color: #444; }
    input, select, textarea {
      padding: 8px 11px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; color: var(--ink); background: var(--canvas);
      transition: border-color .15s; width: 100%;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,58,237,.12); }
    textarea { resize: vertical; min-height: 70px; }
    .char-counter { font-size: 11px; text-align: right; margin-top: 2px; }
    .char-ok { color: var(--success); }
    .char-warn { color: var(--warning); }
    .char-bad { color: var(--danger); }

    /* ── Toggle */
    .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .toggle {
      width: 36px; height: 20px; border-radius: 10px; background: var(--border);
      position: relative; transition: background .2s; cursor: pointer; border: none; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    .toggle.on::after { transform: translateX(16px); }

    /* ── SEO Panel */
    .seo-panel { background: var(--canvas); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .seo-score-ring {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0; border: 3px solid;
    }
    .seo-score-good { border-color: var(--success); color: var(--success); }
    .seo-score-ok { border-color: var(--warning); color: var(--warning); }
    .seo-score-bad { border-color: var(--danger); color: var(--danger); }
    .seo-check { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--surface); }
    .seo-check:last-child { border-bottom: none; }
    .seo-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

    /* ── Tags */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; min-height: 38px; background: var(--canvas); cursor: text; }
    .tags-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,58,237,.12); }
    .tag-chip { display: flex; align-items: center; gap: 4px; padding: 2px 8px; background: #f5f3ff; color: #6d28d9; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .tag-chip button { background: none; border: none; cursor: pointer; color: #6d28d9; font-size: 14px; line-height: 1; padding: 0; }
    .tag-input { border: none !important; outline: none !important; font-size: 13px; font-family: inherit; background: transparent !important; min-width: 100px; flex: 1; padding: 2px 4px !important; box-shadow: none !important; }

    /* ── Search */
    .search-wrap { position: relative; }
    .search-wrap input { padding-left: 32px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--mute); pointer-events: none; }

    /* ── Empty state */
    .empty { text-align: center; padding: 48px 24px; color: var(--mute); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty h3 { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .empty p { font-size: 13px; }

    /* ── Toast */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }
    .toast-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .toast-error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }

    /* ── Editor layout */
    .editor-layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
    .editor-main { display: flex; flex-direction: column; gap: 14px; }

    /* ── MD editor toolbar */
    .md-toolbar { display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid var(--border); background: var(--surface); border-radius: 6px 6px 0 0; flex-wrap: wrap; }
    .md-toolbar button {
      padding: 4px 8px; border: none; background: none; cursor: pointer; border-radius: 4px;
      font-size: 13px; color: var(--mute); transition: all .15s; font-family: inherit;
    }
    .md-toolbar button:hover { background: var(--canvas); color: var(--ink); }
    .md-toolbar .sep { width: 1px; background: var(--border); margin: 2px 4px; }
    .md-textarea {
      border-radius: 0 0 6px 6px !important; border-top: none !important;
      min-height: 320px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6;
    }

    /* ── Overlay / Dialog */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .dialog { background: var(--canvas); border-radius: 12px; padding: 24px; max-width: 380px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,.2); }
    .dialog h3 { margin-bottom: 8px; font-size: 14px; font-weight: 700; }
    .dialog p { font-size: 13px; color: var(--mute); margin-bottom: 20px; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Upload label */
    .upload-label {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 6px; padding: 6px 12px;
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--mute); transition: all .15s; width: fit-content;
    }
    .upload-label:hover { border-color: var(--accent); }
    .upload-label input { display: none; }

    /* ── Misc */
    h2 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .text-mute { color: var(--mute); font-size: 12px; }
    .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
    .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }
    .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; }
    .font-mono { font-family: 'Courier New', monospace; font-size: 12px; }
    .grad-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-text">The Daily <span>Drift</span></div>
    <div class="sidebar-logo-sub">Content Studio</div>
  </div>
  <div class="sidebar-nav">
    <button class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item" data-page="posts" onclick="navigateTo('posts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      All Posts
    </button>
    <button class="nav-item" data-page="new" onclick="navigateTo('new')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      New Post
    </button>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-badge"><span class="dot"></span> CMS running</div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <div class="topbar-actions">
      <span class="text-mute">localhost:4321 ↗</span>
      <a href="http://localhost:4321" target="_blank" class="btn btn-secondary btn-sm">Preview Site</a>
    </div>
  </div>

  <div class="content" id="app-content">
    <!-- Pages rendered here by JS -->
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Confirm dialog (hidden by default) -->
<div class="overlay hidden" id="confirm-overlay">
  <div class="dialog">
    <h3>Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="dialog-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-btn" onclick="confirmAction()">Delete</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// The Daily Drift — Admin CMS (Pure Vanilla JS — zero CDN dependencies)
// ═══════════════════════════════════════════════════════════════════════════════

const API = 'http://localhost:4322/api';
const CAT_LABELS = { 'tech-ai':'Tech & AI', 'memes-trends':'Memes & Trends', 'creators':'Creators', 'movies-ott':'Movies & OTT' };
const CAT_CLS = { 'tech-ai':'badge-tech', 'memes-trends':'badge-memes', 'creators':'badge-creators', 'movies-ott':'badge-movies' };
const TOPBAR_TITLES = { dashboard:'Dashboard', posts:'All Posts', new:'New Post', edit:'Edit Post' };

let state = {
  page: 'dashboard',
  posts: [],
  loading: true,
  editData: null,
  confirmCallback: null,
};

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; setTimeout(() => el.remove(), 200); }, 3500);
}

// ── Confirm dialog ───────────────────────────────────────────────────────────
function openConfirm(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-overlay').classList.remove('hidden');
  state.confirmCallback = cb;
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.add('hidden');
  state.confirmCallback = null;
}
function confirmAction() {
  if (state.confirmCallback) state.confirmCallback();
  closeConfirm();
}

// ── API helpers ──────────────────────────────────────────────────────────────
async function fetchPosts() {
  try {
    const res = await fetch(`${API}/posts`);
    if (!res.ok) throw new Error();
    state.posts = await res.json();
  } catch {
    showToast('Cannot reach CMS server. Is it running?', 'error');
    state.posts = [];
  }
  state.loading = false;
}

async function fetchPost(slug) {
  const res = await fetch(`${API}/posts/${slug}`);
  if (!res.ok) throw new Error('Post not found');
  return await res.json();
}

async function deletePost(slug) {
  await fetch(`${API}/posts/${slug}`, { method: 'DELETE' });
  showToast('Post deleted');
  await fetchPosts();
  render();
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('image', file);
  const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  if (data.url) return data.url;
  throw new Error(data.error || 'Upload failed');
}

// ── Navigation ───────────────────────────────────────────────────────────────
function navigateTo(page, data) {
  state.page = page;
  state.editData = data || null;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page || (page === 'edit' && el.dataset.page === 'posts'));
  });
  document.getElementById('topbar-title').textContent = TOPBAR_TITLES[page] || 'CMS';
  render();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toSlug(t) { return t.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-'); }
function catBadge(cat) { return `<span class="badge ${CAT_CLS[cat] || ''}">${esc(CAT_LABELS[cat] || cat)}</span>`; }
function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return d; } }
function wordCount(s) { return (s || '').split(/\s+/).filter(Boolean).length; }
function charCls(len, min, max) { return len < min ? 'char-warn' : len <= max ? 'char-ok' : 'char-bad'; }

// ── SEO calculator ───────────────────────────────────────────────────────────
function calcSeo(p) {
  const wc = wordCount(p.body);
  const checks = [
    { label: 'Title: 50–65 chars (ideal for Google)', pass: p.title.length >= 40 && p.title.length <= 65, tip: `Currently ${p.title.length} chars` },
    { label: 'Description: 120–160 chars', pass: p.description.length >= 100 && p.description.length <= 160, tip: `Currently ${p.description.length} chars` },
    { label: 'Has hero image URL', pass: !!p.image, tip: 'Add an image URL' },
    { label: 'Has image alt text', pass: !!p.imageAlt, tip: 'Describe the image for screen readers & Google' },
    { label: 'Has 2 or more tags', pass: (p.tags||[]).length >= 2, tip: 'Tags help with topical authority' },
    { label: 'Has author name', pass: !!p.author, tip: 'Google E-E-A-T: authorship matters' },
    { label: 'Has author image', pass: !!p.authorImage, tip: 'Add an author avatar for premium branding' },
    { label: 'Slug is URL-friendly', pass: /^[a-z0-9][a-z0-9-]*$/.test(p.slug || ''), tip: 'Only lowercase letters, numbers, hyphens' },
    { label: 'Content 300+ words', pass: wc >= 300, tip: `Currently ${wc} words (300+ recommended)` },
    { label: 'Has category set', pass: !!p.category, tip: 'Category creates topical clusters' },
  ];
  const score = Math.round((checks.filter(c => c.pass).length / checks.length) * 100);
  return { score, checks };
}

function seoHTML(post) {
  const { score, checks } = calcSeo(post);
  const cls = score >= 80 ? 'seo-score-good' : score >= 50 ? 'seo-score-ok' : 'seo-score-bad';
  const label = score >= 80 ? 'Great!' : score >= 50 ? 'Needs work' : 'Poor';
  return `
    <div class="seo-panel">
      <div class="flex items-center gap-3 mb-4">
        <div class="seo-score-ring ${cls}">${score}</div>
        <div>
          <div style="font-weight:700;font-size:14px">SEO Score</div>
          <div class="text-mute">${label}</div>
        </div>
      </div>
      ${checks.map(c => `
        <div class="seo-check">
          <span class="seo-icon">${c.pass ? '✅' : '⚠️'}</span>
          <div>
            <div style="font-size:12px;font-weight:${c.pass ? 400 : 600};color:${c.pass ? '#444' : '#b45309'}">${esc(c.label)}</div>
            ${!c.pass ? `<div style="font-size:11px;color:#999;margin-top:2px">${esc(c.tip)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function postsTableHTML(filtered) {
  if (filtered.length === 0) {
    return '<div class="empty"><div class="empty-icon">📭</div><h3>No posts found</h3><p>Try a different search or category</p></div>';
  }
  return `
    <table>
      <thead><tr><th>Title</th><th>Slug</th><th>Category</th><th>Date</th><th>Flags</th><th>Actions</th></tr></thead>
      <tbody>
        ${filtered.map(p => `
          <tr>

            <td class="text-mute" style="white-space:nowrap">${fmtDate(p.pubDate)}</td>

              </div>
            </td>
          </tr>
        `).join('')}

function filterPosts() {
  const search = (document.getElementById('posts-search')?.value || '').toLowerCase();
  const cat = document.getElementById('posts-cat-filter')?.value || 'all';
  const filtered = state.posts.filter(p => {
    const matchCat = cat === 'all' || p.category === cat;
    const matchSearch = !search || p.title.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  const wrap = document.getElementById('posts-table-wrap');
  if (wrap) wrap.innerHTML = postsTableHTML(filtered);
}

// ── Editor state (module-level so toolbar/tags/etc. can access) ──────────────
let editorPost = {};
let editorSlugEdited = false;

function renderEditor(initial) {

    author:'The Daily Drift', authorImage:'', category:'tech-ai',

    <div class="flex items-center justify-between mb-6">
      <div>

      </div>

        <button class="btn btn-secondary" id="btn-save-draft" onclick="savePost(true)">Save Draft</button>
        <button class="btn btn-grad" id="btn-publish" onclick="savePost(false)">${isEdit ? 'Publish Changes' : 'Publish Post'}</button>

    </div>

    <div class="editor-layout">
      <div class="editor-main">
        <!-- Post Details -->

          <div class="card-header"><span class="card-title">Post Details</span></div>
          <div class="card-body">
            <div class="form-grid">
              <div class="form-group full">
                <label class="form-label">Title *</label>
                <input id="ed-title" value="${esc(editorPost.title)}" oninput="onTitleInput(this)" placeholder="Enter post title…" />
                <div class="char-counter" id="ed-title-counter"></div>
              </div>
              <div class="form-group full">
                <label class="form-label">Meta Description *</label>
                <textarea id="ed-desc" rows="2" oninput="onDescInput(this)" placeholder="Describe this post in 120–160 characters for Google…">${esc(editorPost.description)}</textarea>
                <div class="char-counter" id="ed-desc-counter"></div>
              </div>
              <div class="form-group">
                <label class="form-label">Slug (URL) *</label>
                <input id="ed-slug" value="${esc(editorPost.slug)}" oninput="onSlugInput(this)" placeholder="my-post-slug" class="font-mono" />
              </div>
              <div class="form-group">
                <label class="form-label">Publish Date</label>
                <input id="ed-date" type="date" value="${esc(editorPost.pubDate)}" onchange="editorPost.pubDate=this.value;refreshSeo()" />
              </div>
              <div class="form-group">
                <label class="form-label">Category *</label>
                <select id="ed-cat" onchange="editorPost.category=this.value;refreshSeo()">
                  <option value="tech-ai" ${editorPost.category==='tech-ai'?'selected':''}>Tech & AI</option>
                  <option value="memes-trends" ${editorPost.category==='memes-trends'?'selected':''}>Memes & Trends</option>
                  <option value="creators" ${editorPost.category==='creators'?'selected':''}>Creators & Influencers</option>
                  <option value="movies-ott" ${editorPost.category==='movies-ott'?'selected':''}>Movies & OTT</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Author</label>
                <input id="ed-author" value="${esc(editorPost.author)}" oninput="editorPost.author=this.value;refreshSeo()" placeholder="Author name" />
              </div>
              <div class="form-group">
                <label class="form-label">Author Image</label>
                <div style="display:flex;gap:8px;align-items:center">
                  <input id="ed-author-img" value="${esc(editorPost.authorImage||'')}" oninput="editorPost.authorImage=this.value;refreshSeo()" placeholder="Paste URL  —or—  upload below" style="flex:1" />
                  <span id="ed-author-img-preview"></span>
                </div>
                <label class="upload-label">

              </div>

              </div>

                  <input id="ed-image" value="${esc(editorPost.image)}" oninput="editorPost.image=this.value;refreshSeo();refreshImagePreview()" placeholder="Paste a URL  —or—  upload from PC below" style="flex:1" />
                  <span id="ed-image-thumb"></span>
                </div>
                <label class="upload-label">
                  📁 Upload image from PC
                  <input type="file" accept="image/*" onchange="handleUpload(this,'image','ed-image')" />

                <label class="form-label">Image Alt Text (important for SEO)</label>

                    <span style="font-size:13px">Featured</span>
                  </label>
                  <label class="toggle-row">
                    <button class="toggle ${editorPost.trending?'on':''}" id="tog-trending" onclick="editorPost.trending=!editorPost.trending;this.classList.toggle('on')"></button>

            <span class="card-title">Content (Markdown)</span>

          <div class="card-body" style="padding:0 0 4px">

      <div style="position:sticky;top:68px">
        <div class="card mb-4">
          <div class="card-header"><span class="card-title">🔍 SEO Checker</span></div>
          <div class="card-body" style="padding:12px" id="seo-panel">${seoHTML(editorPost)}</div>
        </div>

          <div class="card-header"><span class="card-title">Image Preview</span></div>
          <div class="card-body" style="padding:8px" id="image-preview-body">
            ${editorPost.image ? `<img src="${esc(editorPost.image)}" alt="${esc(editorPost.imageAlt)}" style="width:100%;border-radius:6px;aspect-ratio:16/9;object-fit:cover" onerror="this.style.display='none'" />` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Editor interaction handlers ──────────────────────────────────────────────
function onTitleInput(el) {
  editorPost.title = el.value;
  if (!editorSlugEdited) { editorPost.slug = toSlug(el.value); document.getElementById('ed-slug').value = editorPost.slug; }
  const len = el.value.length;
  const cls = charCls(len, 40, 65);
  const hint = len >= 40 && len <= 65 ? '✓ SEO-optimal' : len > 65 ? '— too long for Google' : '— aim for 50+';
  document.getElementById('ed-title-counter').className = `char-counter ${cls}`;
  document.getElementById('ed-title-counter').textContent = `${len}/65 chars ${hint}`;
  refreshSeo();
}

function onDescInput(el) {
  editorPost.description = el.value;
  const len = el.value.length;
  const cls = charCls(len, 100, 160);
  const hint = len >= 100 && len <= 160 ? '✓ SEO-optimal' : len > 160 ? '— too long, will be truncated' : '— too short';
  document.getElementById('ed-desc-counter').className = `char-counter ${cls}`;
  document.getElementById('ed-desc-counter').textContent = `${len}/160 chars ${hint}`;
  refreshSeo();
}

function onSlugInput(el) {
  editorSlugEdited = true;
  editorPost.slug = el.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
  el.value = editorPost.slug;
  refreshSeo();
}

function onBodyInput(el) {
  editorPost.body = el.value;
  document.getElementById('ed-word-count').textContent = wordCount(el.value) + ' words';
  refreshSeo();
}

function refreshSeo() {
  const panel = document.getElementById('seo-panel');
  if (panel) panel.innerHTML = seoHTML(editorPost);
}

function refreshImagePreview() {
  const card = document.getElementById('image-preview-card');
  const body = document.getElementById('image-preview-body');
  if (!card || !body) return;
  if (editorPost.image) {
    card.classList.remove('hidden');
    body.innerHTML = `<img src="${esc(editorPost.image)}" alt="${esc(editorPost.imageAlt)}" style="width:100%;border-radius:6px;aspect-ratio:16/9;object-fit:cover" onerror="this.style.display='none'" />`;
  } else {
    card.classList.add('hidden');
  }
}

function refreshWeeklyNote() {
  const note = document.getElementById('weekly-note');
  if (note) note.classList.toggle('hidden', !editorPost.weeklyHighlight);
}

// ── Tag input ────────────────────────────────────────────────────────────────
function renderTags() {
  const wrap = document.getElementById('tags-wrap');
  if (!wrap) return;
  wrap.innerHTML = editorPost.tags.map(t =>
    `<span class="tag-chip">${esc(t)}<button onclick="removeTag('${esc(t)}')">×</button></span>`
  ).join('') + `<input class="tag-input" id="tag-input" placeholder="${editorPost.tags.length ? '' : 'Add tags, press Enter…'}" onkeydown="onTagKey(event)" onblur="addTag(this.value)" />`;
}

function addTag(val) {
  const t = val.trim().toLowerCase().replace(/\s+/g, '-');
  if (t && !editorPost.tags.includes(t)) { editorPost.tags.push(t); refreshSeo(); }
  renderTags();
}

function removeTag(tag) {
  editorPost.tags = editorPost.tags.filter(t => t !== tag);
  refreshSeo();
  renderTags();
}

function onTagKey(e) {
  if ((e.key === 'Enter' || e.key === ',') && e.target.value.trim()) { e.preventDefault(); addTag(e.target.value); }
  if (e.key === 'Backspace' && !e.target.value && editorPost.tags.length) { editorPost.tags.pop(); refreshSeo(); renderTags(); }
}

// ── Image upload handler ─────────────────────────────────────────────────────
async function handleUpload(input, field, targetInputId) {
  const file = input.files[0];
  if (!file) return;
  showToast('Uploading…');
  try {
    const url = await uploadImage(file);
    editorPost[field] = url;
    document.getElementById(targetInputId).value = url;
    showToast('Image uploaded!');
    refreshSeo();
    if (field === 'image') refreshImagePreview();
  } catch (e) {
    showToast(e.message || 'Upload failed', 'error');
  }
  input.value = '';
}

// ── Markdown toolbar helpers ─────────────────────────────────────────────────
function mdInsert(before, after) {
  const ta = document.getElementById('ed-body');
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  const replacement = before + (sel || 'text') + after;
  ta.setRangeText(replacement, start, end, 'select');
  ta.focus();
  editorPost.body = ta.value;
}

function mdInsertLink() {
  const url = prompt('Enter URL:');
  if (url) mdInsert('[', `](${url})`);
}

function mdInsertImage() {
  const url = prompt('Enter image URL:');
  if (url) { const ta = document.getElementById('ed-body'); ta.setRangeText(`\n![alt text](${url})\n`, ta.selectionStart, ta.selectionEnd, 'end'); editorPost.body = ta.value; ta.focus(); }
}

// ── Save post ────────────────────────────────────────────────────────────────
async function savePost(isDraft) {
  if (!editorPost.title) { showToast('Title is required', 'error'); return; }
  if (!editorPost.slug) { showToast('Slug is required', 'error'); return; }

  const btnDraft = document.getElementById('btn-save-draft');
  const btnPub = document.getElementById('btn-publish');
  btnDraft.disabled = true; btnPub.disabled = true;

  const isEdit = !!state.editData;
  const payload = { ...editorPost, draft: isDraft };

  try {
    const url = isEdit ? `${API}/posts/${state.editData.slug}` : `${API}/posts`;
    const method = isEdit ? 'PUT' : 'POST';
    if (isEdit) payload.newSlug = editorPost.slug;

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Save failed', 'error'); return; }
    showToast(isDraft ? 'Draft saved!' : (isEdit ? 'Post updated & published!' : 'Post published!'));
    await fetchPosts();
    navigateTo('posts');
  } catch {
    showToast('Network error: is the server running?', 'error');
  } finally {
    btnDraft.disabled = false; btnPub.disabled = false;
  }
}

// ── Open editor for existing post ────────────────────────────────────────────
async function openEditor(slug) {
  try {
    const data = await fetchPost(slug);
    navigateTo('edit', data);
  } catch { showToast('Failed to load post', 'error'); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app-content');

  if (state.loading) {
    app.innerHTML = '<div class="empty" style="padding-top:80px"><div class="spinner" style="margin:0 auto 16px"></div><p>Loading posts…</p></div>';
    return;
  }

  switch (state.page) {
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'posts':     app.innerHTML = renderPostsList(); break;
    case 'new':       app.innerHTML = renderEditor(null); break;
    case 'edit':      app.innerHTML = renderEditor(state.editData); break;
    default:          app.innerHTML = renderDashboard();
  }

  // Post-render hooks
  if (state.page === 'new' || state.page === 'edit') {
    renderTags();
    onTitleInput(document.getElementById('ed-title'));
    onDescInput(document.getElementById('ed-desc'));
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  render(); // show loading
  await fetchPosts();
  render(); // show dashboard
})();
</script>
